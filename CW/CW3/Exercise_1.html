  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <title>Debug: Multi-Select Form</title>
  </head>
  <body>
  
  <form action="https://codd.cs.gsu.edu/~cochoatorre1/wp/testing/Exercise_1.php" method="post">
    <label>Your Name: <input name="visitor_name" type="text"></label><br>
    <label>Password: <input name="password" type="password"></label><br>
  
    <label>Optional features:</label>
    <select name="options[]" size="6" multiple>
      <option>Chat</option>
      <option>Email</option>
      <option>File transfer</option>
      <option>Directory</option>
      <option>Shell</option>
      <option>Remote control</option>
    </select>
  
    <div><button type="submit">Sign Up</button></div>
  </form>
  
  </body>
  </html>
